<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Buttons — James Fawcett</title>

        <link
            href="https://fonts.googleapis.com/css?family=Open+Sans:400,300,300italic,400italic,600,600italic,700,700italic,800,800italic"
            rel="stylesheet"
            type="text/css"
        >
        <link
            href="https://fonts.googleapis.com/css?family=Montserrat"
            rel="stylesheet"
            type="text/css"
        >
        <link
            href="https://fonts.googleapis.com/css?family=Ubuntu:700"
            rel="stylesheet"
            type="text/css"
        >
        <link rel="stylesheet" href="https://use.typekit.net/mpd6fuh.css">
        <link
            href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
            rel="stylesheet"
            integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN"
            crossorigin="anonymous"
        >
        <link href="css/styles.css" rel="stylesheet">
    </head>

    <body>
        <main>
            <h1>Button Styling — Andrew Park</h1>

            <div class="button_container">
                <a href="http://www.spotify.com" target="_blank" id="btn_spotify">Spotify</a>
            </div>

            <div class="button_container">
                <a href="http://www.amazon.com" target="_blank" id="btn_amazon">
                    <i class="fa fa-amazon"></i>
                </a>
            </div>

            <div class="button_container">
                <a href="http://www.twitter.com" target="_blank" id="btn_twitter">twitter</a>
            </div>

            <div class="button_container">
                <a href="http://www.indiegogo.com" target="_blank" id="btn_indiegogo">
                    <span>indiegogo</span>
                </a>
            </div>

            <div class="button_container">
                <a href="https://www.ideo.org/" target="_blank" id="IDEO">
                    <span>IDEO</span>
                </a>
            </div>

            <div class="button_container">
                <a href="https://www.lyft.com/" target="_blank" id="LYFT">
                    <span>Lyft</span>
                </a>
            </div>

            <div class="button_container">
                <a href="https://www.apple.com/" target="_blank" id="APPLE">
                    <span>Apple</span>
                </a>
            </div>

            <div class="button_container">
                <a href="https://www.nike.com/" target="_blank" id="NIKE">
                    <span>JUST DO IT</span>
                </a>
            </div>

            <div class="button_container">
                <a href="https://www.facebook.com/" target="_blank" id="FACEBOOK">
                    <span>F</span>
                </a>
            </div>
        </main>
    </body>
</html>
